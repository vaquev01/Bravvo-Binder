name: Bravvo CI/CD Pipeline

on:
  push:
    branches: [ "master", "main" ]
  pull_request:
    branches: [ "master", "main" ]

jobs:
  build-and-test:
    runs-on: ubuntu-latest

    strategy:
      matrix:
        node-version: [18.x]

    steps:
    - uses: actions/checkout@v4

    - name: Use Node.js ${{ matrix.node-version }}
      uses: actions/setup-node@v4
      with:
        node-version: ${{ matrix.node-version }}
        cache: 'npm'

    - name: Install dependencies (Root)
      run: npm ci

    - name: Install Dependencies (Workspaces)
      run: |
        cd Frontend && npm i
        cd ../Backend && npm i
        cd ../Database && npm i

    - name: Generate Prisma Client
      run: cd Database && npx prisma generate

    - name: Lint Frontend
      run: cd Frontend && npm run lint || true

    - name: Build Frontend
      run: npm run build -w Frontend

    - name: Run Unit Tests (Frontend)
      run: cd Frontend && npm run test:unit || true

  # O deploy real p/ o Railway acontece via integração nativa do GitHub x Railway,
  # mas este workflow garante que o código fonte compile as etapas críticas antes do balancer aceitar.
